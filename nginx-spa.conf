server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Asset có hash trong tên (đổi mỗi build) -> cache dài, immutable
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA entry: luôn revalidate, tránh phục vụ index.html cũ sau deploy
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
